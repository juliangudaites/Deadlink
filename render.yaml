# DEADLINK on Render — permanent URL: https://deadlink.onrender.com
services:
  - type: web
    name: deadlink
    runtime: node
    plan: free
    buildCommand: npm install --prefix server && npm install --prefix client --include=dev && npm run build --prefix client
    startCommand: node server/src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: PUBLIC_APP_URL
        value: https://deadlink.onrender.com
      - key: FREE_CREATES_PER_DAY
        value: "3"
      - key: ADMIN_PIN
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BITCOIN_TIP_ADDRESS
        sync: false
      - key: VITE_PUBLIC_SITE_URL
        value: https://deadlink.onrender.com
      - key: VITE_PLAUSIBLE_DOMAIN
        sync: false
      - key: VITE_GA4_MEASUREMENT_ID
        value: G-X1YHBZ5FN3